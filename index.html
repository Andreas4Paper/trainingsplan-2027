<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainingsplan – Rennsteiglauf 2027</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; background: #f0f2f5; color: #222; }

  header {
    background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
    color: white; padding: 24px 32px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.5px; }
  header p { font-size: 0.85rem; opacity: 0.8; margin-top: 4px; }

  .legend {
    display: flex; flex-wrap: wrap; gap: 8px; padding: 14px 32px;
    background: white; border-bottom: 1px solid #ddd;
  }
  .legend-item {
    display: flex; align-items: center; gap: 5px; font-size: 0.75rem; font-weight: 500;
  }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
  }

  .phases-bar {
    display: flex; gap: 8px; padding: 10px 32px; background: #fafafa;
    border-bottom: 1px solid #eee; flex-wrap: wrap;
  }
  .phase-badge {
    font-size: 0.7rem; padding: 3px 10px; border-radius: 12px;
    font-weight: 600; border: 1px solid rgba(0,0,0,0.1);
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px; padding: 24px 32px;
  }

  .month-card {
    background: white; border-radius: 12px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08); overflow: hidden;
  }
  .month-header {
    padding: 12px 16px; font-weight: 700; font-size: 1rem;
    background: #1a237e; color: white;
    display: flex; justify-content: space-between; align-items: center;
  }
  .month-header span { font-size: 0.75rem; opacity: 0.7; font-weight: 400; }
  .phase-label {
    font-size: 0.65rem; padding: 2px 8px; border-radius: 10px;
    background: rgba(255,255,255,0.2); font-weight: 600;
  }

  .weekday-header {
    display: grid; grid-template-columns: repeat(7, 1fr);
    background: #e8eaf6;
  }
  .weekday-header div {
    text-align: center; font-size: 0.65rem; font-weight: 700;
    padding: 5px 2px; color: #3949ab; text-transform: uppercase;
  }

  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 1px; background: #eee;
  }
  .cal-cell {
    background: white; min-height: 72px; padding: 4px;
    font-size: 0.65rem; position: relative;
  }
  .cal-cell.empty { background: #fafafa; }
  .cal-cell.today { background: #fff8e1; }
  .day-num {
    font-size: 0.7rem; font-weight: 600; color: #555; margin-bottom: 3px;
  }
  .cal-cell.sunday .day-num { color: #c62828; }

  .activity {
    border-radius: 4px; padding: 2px 4px; margin-bottom: 2px;
    line-height: 1.3; font-size: 0.62rem; font-weight: 500;
  }
  .act-race    { background: #ffcdd2; color: #b71c1c; border-left: 3px solid #e53935; }
  .act-long    { background: #bbdefb; color: #0d47a1; border-left: 3px solid #1e88e5; }
  .act-tempo   { background: #ffe0b2; color: #bf360c; border-left: 3px solid #fb8c00; }
  .act-interval{ background: #fce4ec; color: #880e4f; border-left: 3px solid #e91e63; }
  .act-medium  { background: #c8e6c9; color: #1b5e20; border-left: 3px solid #43a047; }
  .act-easy    { background: #e8f5e9; color: #2e7d32; border-left: 3px solid #81c784; }
  .act-strength{ background: #e1bee7; color: #4a148c; border-left: 3px solid #8e24aa; }
  .act-baseball{ background: #fff9c4; color: #f57f17; border-left: 3px solid #f9a825; }
  .act-rest    { background: #f5f5f5; color: #9e9e9e; }
  .act-recovery{ background: #e0f2f1; color: #004d40; border-left: 3px solid #26a69a; }
  .act-taper   { background: #f3e5f5; color: #4a148c; border-left: 3px solid #ab47bc; }

  .race-star { font-size: 0.8rem; }

  .stats-bar {
    padding: 16px 32px; background: white; border-top: 1px solid #eee;
    display: flex; gap: 24px; flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat-num { font-size: 1.4rem; font-weight: 700; color: #1a237e; }
  .stat-label { font-size: 0.72rem; color: #888; }

  @media (max-width: 600px) {
    header { padding: 16px; }
    .calendar-grid { padding: 12px; gap: 14px; }
    .legend { padding: 10px 16px; }
  }
  @media print {
    header { position: static; }
    .calendar-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>

<script>
// ============================================================
// DATA
// ============================================================

const RACES = [
  { date: '2026-08-30', name: 'Grafschaftslauf Rietberg',       dist: '28,5 km',           cup: 'ATRC #1', url: 'https://www.grafschaftslauf.de/web/' },
  { date: '2026-09-13', name: 'City Move – Tag des Sportes',    dist: '10 km',             cup: 'ATRC #2', url: 'https://www.bielefeld.jetzt/run' },
  { date: '2026-09-26', name: 'Böckstiegellauf Werther',        dist: '18 km',             cup: 'ATRC #3', url: 'https://www.boeckstiegellauf.de' },
  { date: '2026-10-25', name: 'DJK Halbmarathon Gütersloh',     dist: '21,1 km',           cup: 'ATRC #4', url: 'https://www.djkguetersloh.de' },
  { date: '2026-12-13', name: 'Weihnachts-Crosslauf Borgholzhausen', dist: '16 km',        cup: 'ATRC #5', url: 'https://www.lcsolbad.de' },
  { date: '2027-03-07', name: 'Luisenturmlauf Borgholzhausen',  dist: '21,1 km Trail',     cup: 'ATRC #6', url: 'https://www.lcsolbad.de' },
  { date: '2027-04-25', name: 'Hermannslauf Detmold–Bielefeld', dist: '31,1 km',           cup: 'ATRC #7 🔥', url: 'https://www.hermannslauf.de' },
  { date: '2027-05-22', name: 'RENNSTEIGLAUF SUPERMARATHON',    dist: '~75 km / ~1.400 Hm', cup: '🏆 HAUPTZIEL', url: 'https://www.rennsteiglauf.de' },
];

const raceSet = new Map(RACES.map(r => [r.date, r]));

// Baseball: Mon + Wed, from Sep 15 to Nov 30 2026
const BASEBALL_START = new Date('2026-09-15');
const BASEBALL_END   = new Date('2026-11-30');

// ============================================================
// PHASES
// Each phase has a weekly template: {0:Sun,1:Mon,...,6:Sat}
// Types: race, long, tempo, interval, medium, easy, strength, baseball, rest, recovery
// ============================================================

const PHASES = [
  {
    name: 'Phase 1 – Grundlage',
    color: '#c8e6c9',
    start: '2026-06-01',
    end:   '2026-07-19',

      3: { type: 'medium',   text: 'Mittellauf 12 km', detail: '6:30/km' },
      4: { type: 'strength', text: 'Kraft 60 min', detail: 'Rumpf + Beine' },
      5: { type: 'rest',     text: 'Ruhe', detail: '' },
      6: { type: 'strength', text: 'Kraft 45 min + Locker 6 km', detail: '' },
    }
  },
  {
    name: 'Phase 2 – Aufbau I',
    color: '#b3e5fc',
    start: '2026-07-20',
    end:   '2026-08-23',
    kmWeek: '~54 km',
    template: {
      0: { type: 'long',     text: 'Langer Lauf 22 km', detail: '6:45/km' },
      1: { type: 'rest',     text: 'Ruhe', detail: '' },
      2: { type: 'tempo',    text: 'Tempolauf 10 km', detail: '5:30/km' },
      3: { type: 'medium',   text: 'Mittellauf 14 km', detail: '6:20/km' },
      4: { type: 'strength', text: 'Kraft 60 min', detail: 'Rumpf + Beine' },
      5: { type: 'rest',     text: 'Ruhe', detail: '' },
      6: { type: 'strength', text: 'Kraft 45 min + Easy 8 km', detail: '6:45/km' },
    }
  },
  {
    name: 'Phase 3 – Aufbau II (⚾ ab Mitte Sept.)',
    color: '#fff9c4',
    start: '2026-08-24',
    end:   '2026-10-11',
    kmWeek: '~55 km',
    // Baseball-aware: see getActivity()
    template: {
      0: { type: 'long',     text: 'Langer Lauf 24 km', detail: '6:45/km' },
      1: { type: 'rest',     text: 'Ruhe', detail: '' },           // Mon → Baseball ab Sep15
      2: { type: 'interval', text: 'Intervall 10 km', detail: '4×2km @ 5:00/km' },
      3: { type: 'medium',   text: 'Mittellauf 14 km', detail: '6:20/km' }, // Wed → Baseball ab Sep15
      4: { type: 'strength', text: 'Kraft 60 min + Mittellauf 14 km', detail: '6:20/km' },
      5: { type: 'easy',     text: 'Locker 8 km', detail: '6:45/km' },
      6: { type: 'strength', text: 'Kraft 45 min', detail: '' },
    }
  },
  {
    name: 'Phase 4 – Aufbau III',
    color: '#ffe0b2',
    start: '2026-10-12',
    end:   '2026-12-13',
    kmWeek: '~62 km',
    template: {
      0: { type: 'long',     text: 'Langer Lauf 28–32 km', detail: '6:30/km Trail' },
      1: { type: 'rest',     text: 'Ruhe', detail: '' },           // Mon: Baseball through Nov
      2: { type: 'tempo',    text: 'Tempolauf 12 km', detail: '5:20/km' },
      3: { type: 'medium',   text: 'Mittellauf 14 km', detail: '6:20/km' }, // Wed: Baseball through Nov
      4: { type: 'strength', text: 'Kraft 60 min + Mittellauf 12 km', detail: '6:20/km' },

    start: '2026-12-15',

    kmWeek: '~72 km',
    template: {
      0: { type: 'long',     text: 'Langer Lauf 32–42 km', detail: '7:00/km (Trail-Charakter)' },
      1: { type: 'rest',     text: 'Ruhe', detail: '' },
      2: { type: 'medium',   text: 'Mittellauf 14 km', detail: '6:20/km' },
      3: { type: 'tempo',    text: 'Tempolauf 12 km', detail: '5:20/km' },
      4: { type: 'strength', text: 'Kraft 60 min', detail: 'Oberkörper + Stabilität' },
      5: { type: 'easy',     text: 'Locker 8 km', detail: '6:45/km' },
      6: { type: 'strength', text: 'Kraft 45 min + Trail 12 km', detail: '7:00/km' },
    }
  },
  {
    name: 'Phase 6 – Rennvorbereitung',
    color: '#f3e5f5',
    start: '2027-02-15',
    end:   '2027-04-19',
    kmWeek: '~70 km',
    template: {

      1: { type: 'rest',     text: 'Ruhe', detail: '' },
      2: { type: 'interval', text: 'Intervall 10 km', detail: '3×3km @ 5:00/km' },
      3: { type: 'medium',   text: 'Mittellauf 14 km', detail: '6:15/km' },
      4: { type: 'strength', text: 'Kraft 60 min', detail: 'Beine + Rumpf' },
      5: { type: 'easy',     text: 'Locker 8 km', detail: '6:45/km' },
      6: { type: 'strength', text: 'Kraft 45 min + Trail 12 km', detail: '7:00/km' },

  },
  {
    name: 'Phase 7 – Taper',

    template: {
      0: { type: 'taper',    text: 'Taper-Lauf 18 km', detail: '7:00/km' },
      1: { type: 'rest',     text: 'Ruhe', detail: '' },
      2: { type: 'taper',    text: 'Locker 8 km', detail: '7:00/km' },
      3: { type: 'taper',    text: 'Locker 6 km', detail: '7:00/km' },
      4: { type: 'strength', text: 'Aktivierung 30 min', detail: 'leicht' },
      5: { type: 'rest',     text: 'Ruhe', detail: '' },
      6: { type: 'taper',    text: 'Sehr locker 5 km', detail: '7:15/km' },
    }
  },
];

// Special single-day overrides
const SPECIALS = {
  // Christmas break
  '2026-12-24': { type: 'rest', text: 'Heiligabend 🎄', detail: '' },
  '2026-12-25': { type: 'rest', text: 'Weihnachten 🎄', detail: '' },
  '2026-12-26': { type: 'easy', text: 'Locker 8 km', detail: 'aktive Erholung' },
  '2026-12-31': { type: 'easy', text: 'Jahresabschluss-Lauf 10 km', detail: '6:45/km' },
  '2027-01-01': { type: 'rest', text: 'Neujahr 🎉', detail: '' },
  // Big ultra training run
  '2027-01-17': { type: 'long', text: '⭐ ULTRA-PROBE 50 km', detail: '7:00/km – wichtigster Trainingslauf!' },
};

// ============================================================
// LOGIC
// ============================================================

function dateStr(d) {
  return d.toISOString().slice(0,10);
}

function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

function getPhase(d) {
  const s = dateStr(d);
  return PHASES.find(p => s >= p.start && s <= p.end) || null;
}

function isRaceWeekBefore(d) {
  // Returns race if there's a race within next 1-6 days
  for (let i = 1; i <= 6; i++) {
    const dd = new Date(d); dd.setDate(dd.getDate() + i);
    if (raceSet.has(dateStr(dd))) return raceSet.get(dateStr(dd));
  }
  return null;
}

function isRecoveryDay(d) {
  // Returns true if there was a race in last 1-4 days
  for (let i = 1; i <= 4; i++) {
    const dd = new Date(d); dd.setDate(dd.getDate() - i);
    if (raceSet.has(dateStr(dd))) return true;
  }
  return false;
}

function isBaseballDay(d) {
  if (d < BASEBALL_START || d > BASEBALL_END) return false;
  const dow = d.getDay();
  return dow === 1 || dow === 3; // Mon or Wed
}

function getActivity(d) {
  const s = dateStr(d);

  // Special override
  if (SPECIALS[s]) return SPECIALS[s];

  // Race day
  if (raceSet.has(s)) {
    const r = raceSet.get(s);
    return { type: 'race', text: '🏆 ' + r.name, detail: r.dist + ' · ' + r.cup };
  }

  // Recovery after race
  if (isRecoveryDay(d)) {
    return { type: 'recovery', text: 'Regeneration', detail: 'leichte Bewegung oder Ruhe' };
  }

  const phase = getPhase(d);
  if (!phase) return null;

  const dow = d.getDay();
  let act = phase.template[dow] || null;

  // Baseball override for Mon/Wed during season
  if (isBaseballDay(d)) {
    if (dow === 1) return { type: 'baseball', text: '⚾ Baseball', detail: '19–21 Uhr' };
    if (dow === 3) return { type: 'baseball', text: '⚾ Baseball', detail: '19–21 Uhr' };
  }

  // Taper week: day before race (2 days before → easy, 1 day before → rest)
  const raceAhead = isRaceWeekBefore(d);
  if (raceAhead) {
    // Find how many days to race
    let daysToRace = 0;
    for (let i=1; i<=6; i++) {
      const dd = new Date(d); dd.setDate(dd.getDate()+i);
      if (raceSet.has(dateStr(dd))) { daysToRace = i; break; }
    }
    if (daysToRace === 1) return { type: 'rest', text: 'Ruhe / Vorbereitung', detail: 'Ausrüstung checken' };
    if (daysToRace === 2 && act && act.type !== 'rest') {
      return { type: 'easy', text: 'Locker 6 km', detail: 'Einlaufen für Rennen' };
    }
    if (daysToRace <= 4 && act && (act.type === 'long' || act.type === 'interval' || act.type === 'tempo')) {
      return { type: 'easy', text: 'Locker 8 km', detail: 'Taper-Woche' };
    }
  }

  return act;
}

// ============================================================
// RENDER
// ============================================================

const MONTH_NAMES = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const DOW_SHORT   = ['So','Mo','Di','Mi','Do','Fr','Sa'];

function renderMonth(year, month) {
  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month+1, 0);
  const startDow = (firstDay.getDay() + 6) % 7; // 0=Mon

  // Determine dominant phase for this month
  const midMonth = new Date(year, month, 15);
  const phase = getPhase(midMonth);
  const phaseName = phase ? phase.name : '';
  const phaseColor = phase ? phase.color : '#eee';
  const phaseKm = phase ? phase.kmWeek : '';

  const today = new Date(); today.setHours(0,0,0,0);

  let cells = [];

  // Empty cells before first day
  for (let i = 0; i < startDow; i++) {
    cells.push('<div class="cal-cell empty"></div>');
  }

  // Day cells
  for (let day = 1; day <= lastDay.getDate(); day++) {
    const d = new Date(year, month, day);
    const s = dateStr(d);
    const dow = d.getDay(); // 0=Sun
    const isSun = dow === 0;
    const isToday = d.getTime() === today.getTime();

    const act = getActivity(d);

    let actHtml = '';
    if (act) {
      actHtml = `<div class="activity act-${act.type}">${act.text}${act.detail ? '<br><span style="opacity:0.75">' + act.detail + '</span>' : ''}</div>`;
    }

    cells.push(`<div class="cal-cell${isSun?' sunday':''}${isToday?' today':''}">
      <div class="day-num">${day}</div>
      ${actHtml}
    </div>`);
  }

  // Week stats
  const racesThisMonth = RACES.filter(r => {
    const rd = parseDate(r.date);
    return rd.getFullYear() === year && rd.getMonth() === month;
  });
  const raceInfo = racesThisMonth.length > 0
    ? `<span style="color:#ffcdd2;font-size:0.7rem">🏁 ${racesThisMonth.map(r=>r.name.split(' ')[0]).join(', ')}</span>`
    : `<span style="font-size:0.7rem;opacity:0.5">${phaseKm}</span>`;

  return `
  <div class="month-card">
    <div class="month-header">
      <div>
        ${MONTH_NAMES[month]} ${year}
        ${phaseName ? `<div class="phase-label" style="margin-top:4px;display:inline-block">${phaseName}</div>` : ''}
      </div>
      ${raceInfo}
    </div>
    <div class="weekday-header">
      ${['Mo','Di','Mi','Do','Fr','Sa','So'].map(d=>`<div>${d}</div>`).join('')}
    </div>
    <div class="cal-grid">
      ${cells.join('')}
    </div>
  </div>`;
}

function render() {
  const months = [
    [2026, 5], [2026, 6], [2026, 7], [2026, 8], [2026, 9], [2026, 10],
    [2026, 11], [2027, 0], [2027, 1], [2027, 2], [2027, 3], [2027, 4]
  ];

  // Stats
  const totalRuns = 8;
  const totalKm = '~750 km';

  const statsHtml = `
  <div class="stats-bar">
    <div class="stat"><div class="stat-num">12</div><div class="stat-label">Monate Vorbereitung</div></div>
    <div class="stat"><div class="stat-num">8</div><div class="stat-label">Wettkämpfe</div></div>

    <div class="stat"><div class="stat-num">~1.400 Hm</div><div class="stat-label">Höhenmeter Rennsteiglauf</div></div>
  </div>`;

  // Phase legend
  const phasesHtml = `
  <div class="phases-bar">
    ${PHASES.map(p => `<span class="phase-badge" style="background:${p.color}">${p.name} · ${p.kmWeek}</span>`).join('')}
  </div>`;

  const calHtml = `<div class="calendar-grid">${months.map(([y,m]) => renderMonth(y,m)).join('')}</div>`;

  // Race list
  const raceListHtml = `
  <div style="background:white;margin:0 32px 32px;border-radius:12px;padding:20px;box-shadow:0 1px 6px rgba(0,0,0,0.08)">
    <h2 style="font-size:1rem;margin-bottom:12px;color:#1a237e">🏁 Wettkampfplan</h2>
    <table style="width:100%;border-collapse:collapse;font-size:0.82rem">
      <thead>
        <tr style="background:#e8eaf6;color:#3949ab">
          <th style="padding:6px 10px;text-align:left;border-radius:6px 0 0 6px">Datum</th>
          <th style="padding:6px 10px;text-align:left">Rennen</th>
          <th style="padding:6px 10px;text-align:left">Distanz</th>
          <th style="padding:6px 10px;text-align:left;border-radius:0 6px 6px 0">Cup</th>
        </tr>
      </thead>
      <tbody>
        ${RACES.map((r,i) => `
          <tr style="background:${i===RACES.length-1?'#fff8e1':''}">
            <td style="padding:7px 10px;border-bottom:1px solid #f0f0f0;font-weight:600;color:#555">${formatDate(r.date)}</td>
            <td style="padding:7px 10px;border-bottom:1px solid #f0f0f0;font-weight:${i===RACES.length-1?'700':'400'};color:${i===RACES.length-1?'#b71c1c':'inherit'}">
              <a href="${r.url}" target="_blank" style="color:inherit;text-decoration:none;border-bottom:1px dotted #aaa">${r.name}</a>
            </td>
            <td style="padding:7px 10px;border-bottom:1px solid #f0f0f0">${r.dist}</td>
            <td style="padding:7px 10px;border-bottom:1px solid #f0f0f0;color:#888">${r.cup}</td>
          </tr>`).join('')}
      </tbody>
    </table>
  </div>`;

  document.getElementById('app').innerHTML = statsHtml + phasesHtml + calHtml + raceListHtml;
}

function formatDate(s) {
  const d = parseDate(s);
  return `${d.getDate()}. ${MONTH_NAMES[d.getMonth()].slice(0,3)} ${d.getFullYear()}`;
}

render();
</script>
</body>
</html>
